<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function calc(a, b, callback) {
        console.log(callback(a, b));
      }

      function add(x, y) {
        console.log(x + y);
      }

      function mul(x, y) {
        console.log(x * y);
      }

      calc(5, 3, add);
      calc(5, 3, mul);
    </script>
  </body>
</html>
